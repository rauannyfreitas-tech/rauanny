<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard: Lá Ele</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #121214;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Container do Flashcard */
        .flashcard-container {
            width: 300px;
            height: 400px;
            perspective: 1000px; /* Cria o efeito de profundidade 3D */
        }

        /* O card em si que vai girar */
        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Animação de rotação ao passar o mouse */
        .flashcard-container:hover .flashcard {
            transform: rotateY(180deg);
        }

        /* Estilo comum para a frente e o verso */
        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* Esconde a parte de trás enquanto gira */
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            border: 2px solid #323238;
        }

        /* Parte da Frente */
        .front {
            background: linear-gradient(135deg, #8257e5, #996dff);
            color: #ffffff;
        }

        .front h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .front p {
            margin-top: 15px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* Parte de Trás */
        .back {
            background: #202024;
            color: #e1e1e6;
            transform: rotateY(180deg); /* Já começa virado */
        }

        .back h2 {
            font-size: 1.8rem;
            color: #04d361;
            margin-bottom: 15px;
        }

        .back p {
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .back .example {
            margin-top: 20px;
            font-style: italic;
            color: #8d8d99;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <div class="flashcard-container">
        <div class="flashcard">
            
            <div class="face front">
                <h1>Lá Ele!</h1>
                <p>Passe o mouse para descobrir o significado</p>
            </div>

            <div class="face back">
                <h2>Significado</h2>
                <p>Expressão popular usada principalmente para se esquivar de duplos sentidos, piadas ou insinuações ambíguas.</p>
                <p class="example">"Aquele cara ali te pegou..." <br> <strong>"Lá ele!"</strong></p>
            </div>

        </div>
    </div>

</body>
</html>
